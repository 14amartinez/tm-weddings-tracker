<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build Calendar — TMW OS</title>
<link rel="icon" href="data:,">

<!-- Shared TMW foundations -->
<script src="/tmw-auth.js" defer></script>
<script src="/tmw-core.js" defer></script>

<style>
  :root {
    --bg: #0e0d0c;
    --surface: #1a1816;
    --surface-2: #221f1c;
    --border: #2e2a26;
    --text: #f5f1ea;
    --text-dim: #9a948b;
    --accent: #c9a48a;
    --accent-deep: #8b5e4a;
    --shipped: #4a7c59;
    --in-progress: #c9a48a;
    --queued: #6b6660;
    --on-hold: #8a4a3a;
    --risk: #c75c4d;
    --launch: #d4af6a;
    --season: #5a7d8c;
    --build: #7a6c5d;
    --deadline: #c75c4d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
  }
  .gate {
    display: none;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .gate.active { display: flex; }
  .gate h1 { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem; }
  .gate p { color: var(--text-dim); margin-bottom: 1.5rem; }
  .gate a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent); }

  .app { display: none; }
  .app.active { display: block; }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .topbar h1 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 1.6rem;
    color: var(--accent);
  }
  .topbar .crumbs { font-size: 0.8rem; color: var(--text-dim); }
  .topbar a { color: var(--accent); text-decoration: none; }
  .topbar a:hover { text-decoration: underline; }
  .updated { font-size: 0.75rem; color: var(--text-dim); }

  .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }

  /* === ANCHOR STRIP === */
  .anchors {
    display: flex;
    gap: 0.5rem;
    overflow-x: auto;
    padding: 0.5rem 0 1rem;
    margin-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
    scrollbar-width: thin;
  }
  .anchor {
    flex-shrink: 0;
    padding: 0.5rem 0.85rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    min-width: 160px;
  }
  .anchor .label { color: var(--text); font-weight: 500; }
  .anchor .date { color: var(--text-dim); font-size: 0.7rem; }
  .anchor .countdown { color: var(--accent); font-size: 0.7rem; font-weight: 600; }
  .anchor.kind-launch { border-left: 3px solid var(--launch); }
  .anchor.kind-deadline { border-left: 3px solid var(--deadline); }
  .anchor.kind-risk { border-left: 3px solid var(--risk); }
  .anchor.kind-season { border-left: 3px solid var(--season); }
  .anchor.kind-build { border-left: 3px solid var(--build); }
  .anchor.past { opacity: 0.4; }

  /* === ROADMAP === */
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.4rem;
    color: var(--accent);
    margin-bottom: 1rem;
    margin-top: 0.5rem;
  }
  .roadmap {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.75rem;
    margin-bottom: 2.5rem;
  }
  @media (max-width: 1100px) { .roadmap { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px)  { .roadmap { grid-template-columns: 1fr; } }
  .quarter {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.85rem;
    min-height: 220px;
  }
  .quarter h3 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    margin-bottom: 0.75rem;
    display: flex;
    justify-content: space-between;
  }
  .quarter h3 .count { color: var(--accent); }
  .quarter.current { border-color: var(--accent); }
  .quarter-bucket {
    background: var(--surface-2);
    border-left: 3px solid var(--queued);
    padding: 0.5rem 0.65rem;
    margin-bottom: 0.4rem;
    border-radius: 4px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .quarter-bucket:hover { background: #2a2622; }
  .quarter-bucket.shipped     { border-left-color: var(--shipped); opacity: 0.6; }
  .quarter-bucket.in_progress { border-left-color: var(--in-progress); }
  .quarter-bucket.queued      { border-left-color: var(--queued); }
  .quarter-bucket.on_hold     { border-left-color: var(--on-hold); }
  .quarter-bucket .bname { font-weight: 500; color: var(--text); }
  .quarter-bucket .bmeta { color: var(--text-dim); font-size: 0.7rem; margin-top: 0.15rem; }

  /* === KANBAN === */
  .kanban {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.75rem;
  }
  @media (max-width: 1100px) { .kanban { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px)  { .kanban { grid-template-columns: 1fr; } }
  .kcol {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.85rem;
  }
  .kcol h3 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    margin-bottom: 0.75rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .kcol h3 .count { color: var(--accent); font-weight: 600; }
  .kcol.in_progress h3 .count { color: var(--in-progress); }
  .kcol.shipped h3 .count { color: var(--shipped); }

  .kbucket {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.75rem;
    margin-bottom: 0.6rem;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
  }
  .kbucket:hover { border-color: var(--accent); transform: translateY(-1px); }
  .kbucket .row1 {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.5rem;
    margin-bottom: 0.4rem;
  }
  .kbucket .name { font-weight: 600; font-size: 0.9rem; flex: 1; }
  .kbucket .badge {
    font-size: 0.65rem;
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    background: var(--border);
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .kbucket .badge.security    { background: #5a3a3a; color: #f5d8d2; }
  .kbucket .badge.foundation  { background: #3a4a5a; color: #d2e0f0; }
  .kbucket .badge.feature     { background: #3a5a4a; color: #d2f0e0; }
  .kbucket .badge.integration { background: #5a4a3a; color: #f0e0d2; }
  .kbucket .badge.polish      { background: #4a4a5a; color: #d8d8f0; }
  .kbucket .badge.launch      { background: #6a5a3a; color: #f0e6c8; }
  .kbucket .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 0.85rem;
    font-size: 0.72rem;
    color: var(--text-dim);
  }
  .kbucket .meta span strong { color: var(--text); font-weight: 500; }
  .kbucket .notes {
    margin-top: 0.5rem;
    font-size: 0.75rem;
    color: var(--text-dim);
    line-height: 1.4;
    border-top: 1px solid var(--border);
    padding-top: 0.5rem;
  }
  .kbucket .deps {
    margin-top: 0.4rem;
    font-size: 0.7rem;
    color: var(--text-dim);
  }
  .kbucket .deps strong { color: var(--accent); }

  .empty {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.8rem;
    padding: 1rem 0.5rem;
    font-style: italic;
  }

  /* === MODAL === */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-bg.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    max-width: 600px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal h2 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.6rem;
    color: var(--accent);
    margin-bottom: 0.25rem;
  }
  .modal .modal-id { font-size: 0.7rem; color: var(--text-dim); font-family: monospace; margin-bottom: 1rem; }
  .modal .modal-row {
    display: flex;
    justify-content: space-between;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .modal .modal-row .k { color: var(--text-dim); }
  .modal .modal-row .v { color: var(--text); font-weight: 500; }
  .modal .modal-notes {
    margin-top: 1rem;
    padding: 0.85rem;
    background: var(--surface-2);
    border-radius: 6px;
    font-size: 0.85rem;
    line-height: 1.5;
    color: var(--text);
  }
  .modal-close {
    margin-top: 1rem;
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 0.6rem 1.2rem;
    border-radius: 5px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .modal-close:hover { background: var(--accent-deep); color: var(--text); }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.85rem;
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-bottom: 1rem;
  }
  .legend-dot {
    display: inline-block;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    margin-right: 0.3rem;
    vertical-align: middle;
  }

  .summary-bar {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem 0.9rem;
    flex: 1;
    min-width: 140px;
  }
  .stat .n {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    color: var(--accent);
    line-height: 1;
  }
  .stat .l {
    font-size: 0.7rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 0.25rem;
  }
</style>
</head>
<body>

<!-- ACCESS GATE (rendered when user not owner) -->
<div id="gate" class="gate">
  <div>
    <h1>Owner only</h1>
    <p>This dashboard is restricted to portal owners.</p>
    <a href="/index.html">← Back to team home</a>
  </div>
</div>

<!-- APP (rendered when user is owner) -->
<div id="app" class="app">
  <div class="topbar">
    <div>
      <div class="crumbs"><a href="/dashboard/index.html">← Dashboard</a></div>
      <h1>Build Calendar</h1>
    </div>
    <div class="updated" id="updated"></div>
  </div>

  <div class="container">
    <!-- Anchors strip -->
    <div class="anchors" id="anchors"></div>

    <!-- Summary stats -->
    <div class="summary-bar" id="summary"></div>

    <!-- Roadmap quarters -->
    <h2 class="section-title">Roadmap</h2>
    <div class="legend">
      <span><span class="legend-dot" style="background: var(--shipped);"></span>Shipped</span>
      <span><span class="legend-dot" style="background: var(--in-progress);"></span>In Progress</span>
      <span><span class="legend-dot" style="background: var(--queued);"></span>Queued</span>
      <span><span class="legend-dot" style="background: var(--on-hold);"></span>On Hold</span>
    </div>
    <div class="roadmap" id="roadmap"></div>

    <!-- Kanban -->
    <h2 class="section-title">Kanban</h2>
    <div class="kanban" id="kanban"></div>
  </div>
</div>

<!-- Detail modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal"></div>
</div>

<script>
  // OWNER GATE — JS-layer only per CLAUDE.md rule #3 (until b2_5/b2_6).
  const OWNER_EMAILS = [
    'tonyellismartinez@gmail.com',
    'brynn.weller95@gmail.com'
  ];

  const QUARTER_ORDER = ['Q2-2026', 'Q3-2026', 'Q4-2026', 'Q1-2027'];
  const QUARTER_LABELS = {
    'Q2-2026': 'Q2 2026 · May–Jun',
    'Q3-2026': 'Q3 2026 · Jul–Sep',
    'Q4-2026': 'Q4 2026 · Oct–Dec',
    'Q1-2027': 'Q1 2027 · Jan–Mar'
  };

  function currentQuarter() {
    // Today is May 2026 → Q2-2026
    const d = new Date();
    const m = d.getMonth(); // 0-11
    const y = d.getFullYear();
    if (m <= 2) return `Q1-${y}`;
    if (m <= 5) return `Q2-${y}`;
    if (m <= 8) return `Q3-${y}`;
    return `Q4-${y}`;
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function daysUntil(iso) {
    if (!iso) return null;
    const today = new Date();
    today.setHours(0,0,0,0);
    const target = new Date(iso + 'T00:00:00');
    const diff = Math.round((target - today) / (1000 * 60 * 60 * 24));
    return diff;
  }

  function countdownLabel(iso) {
    const d = daysUntil(iso);
    if (d === null) return '';
    if (d < 0) return `${Math.abs(d)}d ago`;
    if (d === 0) return 'today';
    if (d === 1) return 'tomorrow';
    return `in ${d}d`;
  }

  let allBuckets = [];
  let allAnchors = [];

  async function load() {
    // Wait for auth to resolve. Per CLAUDE.md rule #2.
    await whenUserReady();

    const user = window.tmwUser;
    if (!user || !OWNER_EMAILS.includes((user.email || '').toLowerCase())) {
      document.getElementById('gate').classList.add('active');
      return;
    }
    document.getElementById('app').classList.add('active');

    try {
      const rows = await tmwSbFetch('projects?id=eq.tmw_build_plan&select=data,updated_at');
      if (!rows || !rows.length) {
        document.getElementById('roadmap').innerHTML =
          '<div class="empty">Build plan not found. Run the seed SQL.</div>';
        return;
      }
      const plan = rows[0].data;
      allBuckets = plan.buckets || [];
      allAnchors = plan.anchors || [];

      document.getElementById('updated').textContent =
        'Plan updated ' + fmtDate(plan.updated_at);

      renderAnchors();
      renderSummary();
      renderRoadmap();
      renderKanban();
    } catch (err) {
      console.error('build-calendar load failed', err);
      document.getElementById('roadmap').innerHTML =
        '<div class="empty">Failed to load build plan. Check console.</div>';
    }
  }

  function renderAnchors() {
    const el = document.getElementById('anchors');
    el.innerHTML = '';
    const sorted = [...allAnchors].sort((a, b) => a.date.localeCompare(b.date));
    sorted.forEach(a => {
      const past = daysUntil(a.date) < 0;
      const div = document.createElement('div');
      div.className = `anchor kind-${a.kind || 'build'}` + (past ? ' past' : '');
      div.innerHTML = `
        <div class="label">${a.label}</div>
        <div class="date">${fmtDate(a.date)}</div>
        <div class="countdown">${countdownLabel(a.date)}</div>
      `;
      el.appendChild(div);
    });
  }

  function renderSummary() {
    const el = document.getElementById('summary');
    const counts = { shipped: 0, in_progress: 0, queued: 0, on_hold: 0 };
    let totalHours = 0;
    let queuedHours = 0;
    allBuckets.forEach(b => {
      counts[b.status] = (counts[b.status] || 0) + 1;
      if (b.estimated_hours) {
        totalHours += b.estimated_hours;
        if (b.status === 'queued' || b.status === 'in_progress') {
          queuedHours += b.estimated_hours;
        }
      }
    });
    el.innerHTML = `
      <div class="stat"><div class="n">${counts.shipped}</div><div class="l">Shipped</div></div>
      <div class="stat"><div class="n">${counts.in_progress}</div><div class="l">In Progress</div></div>
      <div class="stat"><div class="n">${counts.queued}</div><div class="l">Queued</div></div>
      <div class="stat"><div class="n">${queuedHours.toFixed(1)}h</div><div class="l">Hours Remaining</div></div>
    `;
  }

  function renderRoadmap() {
    const el = document.getElementById('roadmap');
    el.innerHTML = '';
    const cq = currentQuarter();
    QUARTER_ORDER.forEach(q => {
      const inQ = allBuckets.filter(b => b.quarter === q);
      const col = document.createElement('div');
      col.className = 'quarter' + (q === cq ? ' current' : '');
      col.innerHTML = `<h3>${QUARTER_LABELS[q]} <span class="count">${inQ.length}</span></h3>`;

      // Sort: in_progress first, then queued (by priority+target_date), then shipped
      inQ.sort((a, b) => {
        const order = { in_progress: 0, queued: 1, on_hold: 2, shipped: 3 };
        if (order[a.status] !== order[b.status]) return order[a.status] - order[b.status];
        if ((a.priority || 99) !== (b.priority || 99)) return (a.priority || 99) - (b.priority || 99);
        return (a.target_date || 'z').localeCompare(b.target_date || 'z');
      });

      if (!inQ.length) {
        col.innerHTML += '<div class="empty">Open</div>';
      } else {
        inQ.forEach(b => {
          const div = document.createElement('div');
          div.className = `quarter-bucket ${b.status}`;
          div.innerHTML = `
            <div class="bname">${b.name}</div>
            <div class="bmeta">
              ${b.status === 'shipped'
                ? `Shipped ${fmtDate(b.shipped_date)}`
                : (b.target_date ? `Target ${fmtDate(b.target_date)}` : 'No date set')}
              ${b.estimated_hours ? ` · ${b.estimated_hours}h` : ''}
            </div>
          `;
          div.onclick = () => openModal(b);
          col.appendChild(div);
        });
      }
      el.appendChild(col);
    });
  }

  function renderKanban() {
    const el = document.getElementById('kanban');
    el.innerHTML = '';
    const cols = [
      { key: 'in_progress', label: 'In Progress' },
      { key: 'queued',      label: 'Queued' },
      { key: 'on_hold',     label: 'On Hold' },
      { key: 'shipped',     label: 'Shipped' }
    ];
    cols.forEach(c => {
      const list = allBuckets.filter(b => b.status === c.key);

      // Sort
      if (c.key === 'shipped') {
        list.sort((a, b) => (b.shipped_date || '').localeCompare(a.shipped_date || ''));
      } else {
        list.sort((a, b) => {
          if ((a.priority || 99) !== (b.priority || 99)) return (a.priority || 99) - (b.priority || 99);
          return (a.target_date || 'z').localeCompare(b.target_date || 'z');
        });
      }

      const col = document.createElement('div');
      col.className = `kcol ${c.key}`;
      col.innerHTML = `<h3>${c.label} <span class="count">${list.length}</span></h3>`;

      if (!list.length) {
        col.innerHTML += '<div class="empty">Empty</div>';
      } else {
        list.forEach(b => {
          const card = document.createElement('div');
          card.className = 'kbucket';
          const dateLine = c.key === 'shipped'
            ? (b.shipped_date ? `<span><strong>Shipped:</strong> ${fmtDate(b.shipped_date)}</span>` : '')
            : (b.target_date ? `<span><strong>Target:</strong> ${fmtDate(b.target_date)}</span>` : '');
          const hoursLine = b.estimated_hours ? `<span><strong>Est:</strong> ${b.estimated_hours}h</span>` : '';
          const priorityLine = b.priority ? `<span><strong>P${b.priority}</strong></span>` : '';
          const depsLine = (b.dependencies && b.dependencies.length)
            ? `<div class="deps"><strong>Deps:</strong> ${b.dependencies.join(', ')}</div>`
            : '';
          const notes = b.notes
            ? `<div class="notes">${escape(b.notes)}</div>`
            : '';

          card.innerHTML = `
            <div class="row1">
              <div class="name">${b.name}</div>
              <span class="badge ${b.category}">${b.category}</span>
            </div>
            <div class="meta">
              ${priorityLine}
              ${dateLine}
              ${hoursLine}
            </div>
            ${depsLine}
            ${notes}
          `;
          card.onclick = () => openModal(b);
          col.appendChild(card);
        });
      }
      el.appendChild(col);
    });
  }

  function escape(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function openModal(b) {
    const dateRow = b.status === 'shipped'
      ? `<div class="modal-row"><span class="k">Shipped</span><span class="v">${fmtDate(b.shipped_date)}</span></div>`
      : `<div class="modal-row"><span class="k">Target</span><span class="v">${fmtDate(b.target_date)} ${b.target_date ? `(${countdownLabel(b.target_date)})` : ''}</span></div>`;

    document.getElementById('modal').innerHTML = `
      <h2>${escape(b.name)}</h2>
      <div class="modal-id">${b.id}</div>
      <div class="modal-row"><span class="k">Status</span><span class="v">${b.status.replace('_', ' ')}</span></div>
      <div class="modal-row"><span class="k">Category</span><span class="v">${b.category}</span></div>
      <div class="modal-row"><span class="k">Priority</span><span class="v">${b.priority ? 'P' + b.priority : '—'}</span></div>
      <div class="modal-row"><span class="k">Quarter</span><span class="v">${QUARTER_LABELS[b.quarter] || b.quarter}</span></div>
      ${dateRow}
      <div class="modal-row"><span class="k">Estimated hours</span><span class="v">${b.estimated_hours ? b.estimated_hours + 'h' : '—'}</span></div>
      <div class="modal-row"><span class="k">Dependencies</span><span class="v">${(b.dependencies && b.dependencies.length) ? b.dependencies.join(', ') : '—'}</span></div>
      ${b.notes ? `<div class="modal-notes">${escape(b.notes)}</div>` : ''}
      <button class="modal-close" onclick="closeModal()">Close</button>
    `;
    document.getElementById('modalBg').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modalBg').classList.remove('active');
  }

  document.getElementById('modalBg').addEventListener('click', (e) => {
    if (e.target.id === 'modalBg') closeModal();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // Kick off
  load();
</script>

</body>
</html>
