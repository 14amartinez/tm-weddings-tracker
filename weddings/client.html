<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TM Weddings — Wedding Info</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --cream:#faf8f4;--cream-dark:#f0ece4;--border:#e2ddd6;
  --text-primary:#1a1714;--text-secondary:#6b6560;--text-muted:#a09a93;
  --accent:#8b5e4a;--accent-light:#f5ede8;--accent-mid:#c9a48a;
  --green:#3d6b45;--green-light:#eaf2eb;--white:#fff;
  --shadow:0 4px 16px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-primary);min-height:100vh;}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.back-link{font-size:12px;color:var(--text-muted);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color 0.15s;}
.back-link:hover{color:var(--accent);}
.topbar-right{display:flex;align-items:center;gap:10px;}
#sync-status{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:5px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text-muted);}
.sync-dot.ok{background:var(--green);}.sync-dot.saving{background:#8a6020;}.sync-dot.error{background:#8b2e2e;}
.btn-sm{height:30px;padding:0 12px;font-size:11px;font-weight:500;cursor:pointer;border-radius:6px;background:none;color:var(--text-muted);border:1px solid var(--border);font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.btn-sm:hover{color:var(--accent);border-color:var(--accent-mid);}
.admin-badge{font-size:10px;font-weight:500;padding:3px 8px;border-radius:20px;background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-mid);}
.main{max-width:900px;margin:0 auto;padding:32px 24px 80px;}

/* HERO */
.hero{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:28px 32px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent),var(--accent-mid));}
.hero-date{font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}
.hero-client{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:400;line-height:1.1;margin-bottom:8px;}
.hero-venue{font-size:14px;color:var(--text-muted);margin-bottom:16px;display:flex;align-items:center;gap:6px;}
.hero-venue a{color:var(--accent);text-decoration:none;}
.hero-venue a:hover{text-decoration:underline;}
.hero-meta{display:flex;gap:12px;flex-wrap:wrap;}
.hero-tag{font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;background:var(--cream-dark);color:var(--text-secondary);border:1px solid var(--border);}
.hero-tag.pkg{background:var(--accent-light);color:var(--accent);border-color:var(--accent-mid);}

/* GRID */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.full-col{margin-bottom:16px;}

/* SECTIONS */
.section-card{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--cream-dark);}
.section-title{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);}
.section-body{padding:16px 20px;}

/* TEAM */
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.team-row{display:flex;flex-direction:column;gap:2px;}
.team-label{font-size:10px;color:var(--text-muted);letter-spacing:0.07em;text-transform:uppercase;}
.team-val{font-size:13px;color:var(--text-primary);}
.team-edit{height:28px;font-size:12px;padding:0 7px;border:1px solid var(--border);border-radius:5px;background:var(--cream);color:var(--text-primary);font-family:'DM Sans',sans-serif;outline:none;width:100%;}
.team-edit:focus{border-color:var(--accent-mid);}

/* VENDORS */
.vendor-row{display:grid;grid-template-columns:1fr 1fr 1fr 24px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.vendor-row:last-child{border-bottom:none;}
.vendor-input{height:30px;font-size:12px;padding:0 7px;border:1px solid var(--border);border-radius:5px;background:var(--cream);color:var(--text-primary);font-family:'DM Sans',sans-serif;outline:none;width:100%;}
.vendor-input:focus{border-color:var(--accent-mid);}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:13px;padding:2px 4px;border-radius:4px;}
.del-btn:hover{color:#8b2e2e;background:#fdeaea;}
.vendor-header{display:grid;grid-template-columns:1fr 1fr 1fr 24px;gap:8px;padding:0 0 8px;border-bottom:1px solid var(--border);margin-bottom:4px;}
.col-label{font-size:10px;color:var(--text-muted);letter-spacing:0.07em;text-transform:uppercase;}
.add-row-btn{height:28px;padding:0 12px;font-size:11px;font-weight:500;cursor:pointer;border-radius:6px;background:var(--white);color:var(--accent);border:1px solid var(--accent-mid);font-family:'DM Sans',sans-serif;margin-top:10px;transition:background 0.15s;}
.add-row-btn:hover{background:var(--accent-light);}

/* TIMELINE */
.timeline-row{display:grid;grid-template-columns:100px 1fr 24px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.timeline-row:last-child{border-bottom:none;}
.time-input{height:30px;font-size:12px;padding:0 7px;border:1px solid var(--border);border-radius:5px;background:var(--cream);color:var(--text-primary);font-family:'DM Sans',sans-serif;outline:none;width:100%;}
.time-input:focus{border-color:var(--accent-mid);}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--accent-mid);flex-shrink:0;}

/* SHOT LIST */
.shot-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.shot-item:last-child{border-bottom:none;}
.shot-check{width:16px;height:16px;cursor:pointer;accent-color:var(--accent);flex-shrink:0;}
.shot-text{flex:1;font-size:13px;color:var(--text-primary);}
.shot-input{height:30px;font-size:12px;padding:0 7px;border:1px solid var(--border);border-radius:5px;background:var(--cream);color:var(--text-primary);font-family:'DM Sans',sans-serif;outline:none;flex:1;}

/* NOTES */
.notes-area{width:100%;min-height:100px;font-size:13px;padding:10px;border:1px solid var(--border);border-radius:7px;background:var(--cream);color:var(--text-primary);font-family:'DM Sans',sans-serif;outline:none;resize:vertical;line-height:1.6;}
.notes-area:focus{border-color:var(--accent-mid);}
.notes-area[readonly]{background:var(--cream-dark);}

/* DELIVERABLES */
.del-list{display:flex;flex-direction:column;gap:6px;}
.del-item{display:flex;align-items:center;gap:8px;font-size:13px;}
.del-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-mid);flex-shrink:0;}

/* MISC */
.action-bar{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
.btn-action{display:inline-flex;align-items:center;gap:7px;height:38px;padding:0 18px;font-size:12px;font-weight:500;cursor:pointer;border-radius:8px;text-decoration:none;font-family:'DM Sans',sans-serif;transition:all 0.2s;white-space:nowrap;}
.btn-shotcaller{background:#1a1714;color:#fff;border:none;}
.btn-shotcaller:hover{background:#2c2420;}
.btn-wallpaper{background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-mid);}
.btn-wallpaper:hover{background:var(--accent);color:#fff;}
.save-bar.visible{display:flex;}
.btn-save{height:36px;padding:0 24px;font-size:13px;font-weight:500;cursor:pointer;border-radius:7px;background:var(--accent);color:var(--white);border:none;font-family:'DM Sans',sans-serif;transition:background 0.15s;}
.btn-save:hover{background:#7a5240;}
.save-hint{font-size:12px;color:var(--text-muted);}
.empty-note{font-size:12px;color:var(--text-muted);font-style:italic;padding:8px 0;}
.error-banner{background:#fdeaea;border:1px solid #e8a0a0;border-radius:8px;padding:10px 14px;font-size:12px;color:#8b2e2e;margin-bottom:14px;display:none;}
.loading-screen{display:flex;flex-direction:column;align-items:center;padding:80px;gap:14px;}
.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent-mid);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:var(--text-muted);}
@media(max-width:640px){
  .main{padding:16px 16px 80px;}
  .two-col{grid-template-columns:1fr;}
  .team-grid{grid-template-columns:1fr;}
  .vendor-row,.vendor-header{grid-template-columns:1fr 1fr;}
  .vendor-row .vendor-input:nth-child(3),.vendor-header .col-label:nth-child(3){display:none;}
  .topbar{padding:0 16px;}
}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-link" href="/weddings/">&#8592; All Weddings</a>
  <div class="topbar-right">
    <div id="sync-status"><span class="sync-dot" id="sync-dot"></span><span id="sync-text">Loading...</span></div>
    <span id="admin-badge" class="admin-badge" style="display:none;">Admin</span>
    <button class="btn-sm" id="admin-btn" onclick="toggleAdmin()" style="display:none;">Admin</button>
  </div>
</div>

<div class="main">
  <div class="error-banner" id="error-banner"></div>
  <div id="loading" class="loading-screen"><div class="spinner"></div><div class="loading-text">Loading wedding info...</div></div>
  <div id="content" style="display:none;"></div>
</div>

<div class="save-bar" id="save-bar">
  <span class="save-hint">Unsaved changes</span>
  <button class="btn-save" onclick="saveChanges()">Save changes</button>
</div>

<script src="/tmw-core.js"></script>
<script>
const SUPABASE_URL=TMW.supabase.url;
const SUPABASE_KEY=TMW.supabase.key;
const ADMIN_PW=TMW.admin.password;
const TEAM_MEMBERS=['Tony','Brynn','Lexi','Zyara','Nick','Nathan','Luke','Zach','PJ','Nolan','Isabella','Bella','Kaitlyn','Chris','Dylan'];

let weddings=[];
let wedding=null;
let isAdmin=false;
let dirty=false;
const weddingId=new URLSearchParams(location.search).get('id');

function setSS(state,text){document.getElementById('sync-dot').className='sync-dot '+state;document.getElementById('sync-text').textContent=text;}
function showError(msg){const b=document.getElementById('error-banner');b.textContent=msg;b.style.display='block';setTimeout(()=>b.style.display='none',7000);}
function markDirty(){if(!isAdmin)return;dirty=true;document.getElementById('save-bar').classList.add('visible');}

function toggleAdmin(){
  if(isAdmin){isAdmin=false;sessionStorage.removeItem('tmw_wdi_admin');applyAdmin();renderPage();}
  else{
    const pw=prompt('Admin password:');
    if(pw===ADMIN_PW){isAdmin=true;sessionStorage.setItem('tmw_wdi_admin','1');applyAdmin();renderPage();}
  }
}
function applyAdmin(){
  document.getElementById('admin-badge').style.display=isAdmin?'flex':'none';
  document.getElementById('admin-btn').textContent=isAdmin?'Exit admin':'Admin';
  document.getElementById('admin-btn').style.display='flex';
}

// sbFetch → loaded from tmw-core.js

async function loadData(){
  setSS('','Loading...');
  try{
    const rows=await sbFetch('projects?id=eq.tmw_weddings&select=data');
    if(rows&&rows[0]){
      weddings=rows[0].data.weddings||[];
      wedding=weddings.find(w=>w.id===weddingId);
    }
    if(!wedding){
      document.getElementById('loading').innerHTML='<div style="text-align:center;padding:48px;color:var(--text-muted);">Wedding not found. <a href="/weddings/" style="color:var(--accent);">Back to all weddings</a></div>';
      return;
    }
    document.title='TM Weddings — '+wedding.client;
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
    document.getElementById('admin-btn').style.display='flex';
    setSS('ok','Live');
    renderPage();
  }catch(e){
    setSS('error','Connection failed');
    document.getElementById('loading').style.display='none';
    showError('Connection failed: '+e.message);
  }
}

async function saveChanges(){
  setSS('saving','Saving...');
  try{
    await sbFetch('projects?id=eq.tmw_weddings',{method:'PATCH',body:JSON.stringify({data:{weddings}})});
    setSS('ok','Saved — '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
    dirty=false;
    document.getElementById('save-bar').classList.remove('visible');
  }catch(e){setSS('error','Save failed');showError('Save failed.');}
}

function fmtDate(d){
  if(!d)return'Date TBD';
  return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}

function memberOpts(val){
  return`<option value="">—</option>`+TEAM_MEMBERS.map(m=>`<option${val===m?' selected':''}>${m}</option>`).join('');
}

function renderPage(){
  const w=wedding;
  const ro=!isAdmin;

  let html=`
  <div class="hero">
    <div class="hero-date">${fmtDate(w.date)}</div>
    <div class="hero-client">${w.client}</div>
    <div class="hero-venue">
      📍 ${w.venue?`<a href="https://maps.google.com?q=${encodeURIComponent(w.venue)}" target="_blank">${w.venue}</a>`:'<span style="font-style:italic;color:var(--text-muted);">Venue TBD</span>'}
      ${w.venueAddress?`<span style="color:var(--text-muted);">— ${w.venueAddress}</span>`:''}
    </div>
    <div class="hero-meta">
      <span class="hero-tag pkg">${w.package||'Package TBD'}</span>
      ${w.miles?`<span class="hero-tag">${w.miles} mi</span>`:''}
      ${w.package_code?`<span class="hero-tag">${w.package_code}</span>`:''}
    </div>
    ${(w.shotCallerUrl||w.wallpaperUrl)?`
    <div class="action-bar">
      ${w.shotCallerUrl?`<a class="btn-action btn-shotcaller" href="${w.shotCallerUrl}" target="_blank">📋 Open Shot Caller</a>`:''}
      ${w.wallpaperUrl?`<a class="btn-action btn-wallpaper" href="${w.wallpaperUrl}" download>📱 Download Timeline Wallpaper</a>`:''}
    </div>`:''}
  </div>

  <div class="two-col">
    <!-- TEAM -->
    <div class="section-card">
      <div class="section-header"><span class="section-title">📸 Shooter Assignments</span></div>
      <div class="section-body">
        <div class="team-grid">
          ${renderTeamField('leadPhoto','Lead Photo',w.team.leadPhoto,ro)}
          ${renderTeamField('secondPhoto','2nd Photo',w.team.secondPhoto,ro)}
          ${renderTeamField('photoShadow','Photo Shadow',w.team.photoShadow,ro)}
          ${renderTeamField('leadVideo','Lead Video',w.team.leadVideo,ro)}
          ${renderTeamField('secondVideo','2nd Video',w.team.secondVideo,ro)}
          ${renderTeamField('videoShadow','Video Shadow',w.team.videoShadow,ro)}
          ${renderTeamField('contentCreator','Content Creator',w.team.contentCreator||'',ro)}
          ${renderTeamField('bts','BTS',w.team.bts,ro)}
        </div>
      </div>
    </div>

    <!-- LOCATIONS -->
    <div class="section-card">
      <div class="section-header"><span class="section-title">📍 Locations</span></div>
      <div class="section-body" style="display:flex;flex-direction:column;gap:12px;">
        <div class="team-row">
          <div class="team-label">Ceremony venue</div>
          ${ro?`<div class="team-val">${w.ceremonyVenue||'—'}</div>`:`<input class="team-edit" value="${w.ceremonyVenue||''}" placeholder="Church, park, etc." oninput="w.ceremonyVenue=this.value;markDirty()"/>`}
        </div>
        <div class="team-row">
          <div class="team-label">Reception venue</div>
          ${ro?`<div class="team-val">${w.venue||'—'}</div>`:`<input class="team-edit" value="${w.venue||''}" placeholder="Reception venue" oninput="w.venue=this.value;markDirty()"/>`}
        </div>
        <div class="team-row">
          <div class="team-label">Venue address</div>
          ${ro?`<div class="team-val">${w.venueAddress||'—'}</div>`:`<input class="team-edit" value="${w.venueAddress||''}" placeholder="Full address" oninput="w.venueAddress=this.value;markDirty()"/>`}
        </div>
        <div class="team-row">
          <div class="team-label">Wedding date</div>
          ${ro?`<div class="team-val">${fmtDate(w.date)}</div>`:`<input class="team-edit" type="date" value="${w.date||''}" oninput="w.date=this.value;markDirty()"/>`}
        </div>
        <div class="team-row">
          <div class="team-label">Package</div>
          ${ro?`<div class="team-val">${w.package||'—'}</div>`:`<select class="team-edit" onchange="w.package=this.value;markDirty()"><option>Photo + Video</option><option>Photo only</option><option>Video only</option><option>Photo + Video + Content</option><option>Content only</option></select>`}
        </div>
      </div>
    </div>
  </div>

  <!-- VENDORS -->
  <div class="section-card full-col">
    <div class="section-header">
      <span class="section-title">🌸 Vendors</span>
      ${isAdmin?`<button class="add-row-btn" onclick="addVendor()">+ Add vendor</button>`:''}
    </div>
    <div class="section-body">
      ${w.vendors&&w.vendors.length?`
        <div class="vendor-header">
          <span class="col-label">Name</span>
          <span class="col-label">Role</span>
          <span class="col-label">Contact</span>
          <span></span>
        </div>
        <div id="vendor-list">
          ${w.vendors.map((v,i)=>renderVendorRow(v,i,ro)).join('')}
        </div>
      `:`<div class="empty-note">No vendors added yet${isAdmin?' — click + Add vendor above':''}</div>`}
    </div>
  </div>

  <!-- TIMELINE -->
  <div class="section-card full-col">
    <div class="section-header">
      <span class="section-title">🕐 Day Timeline</span>
      ${isAdmin?`<button class="add-row-btn" onclick="addTimeline()">+ Add time block</button>`:''}
    </div>
    <div class="section-body">
      ${w.timeline&&w.timeline.length?`
        <div id="timeline-list">
          ${w.timeline.map((t,i)=>renderTimelineRow(t,i,ro)).join('')}
        </div>
      `:`<div class="empty-note">No timeline added yet${isAdmin?' — click + Add time block above':''}</div>`}
    </div>
  </div>

  <div class="two-col">
    <!-- SHOT LIST -->
    <div class="section-card">
      <div class="section-header">
        <span class="section-title">🎯 Shot List</span>
        ${isAdmin?`<button class="add-row-btn" onclick="addShot()">+ Add</button>`:''}
      </div>
      <div class="section-body">
        ${w.shotList&&w.shotList.length?`
          <div id="shot-list">
            ${w.shotList.map((s,i)=>renderShotRow(s,i,ro)).join('')}
          </div>
        `:`<div class="empty-note">No shot list yet${isAdmin?' — click + Add above':''}</div>`}
      </div>
    </div>

    <!-- DELIVERABLES & NOTES -->
    <div style="display:flex;flex-direction:column;gap:16px;">
      <div class="section-card">
        <div class="section-header"><span class="section-title">📦 Package / Deliverables</span></div>
        <div class="section-body">
          ${ro?
            `<div class="team-val" style="font-size:13px;line-height:1.6;">${w.deliverables||'<span style="font-style:italic;color:var(--text-muted);">Not specified</span>'}</div>`:
            `<textarea class="notes-area" placeholder="What's included in their package — e.g. 2-3 min highlight, full doc, photo gallery, photo book..." oninput="w.deliverables=this.value;markDirty()">${w.deliverables||''}</textarea>`
          }
        </div>
      </div>
      <div class="section-card">
        <div class="section-header"><span class="section-title">📝 Notes</span></div>
        <div class="section-body">
          ${ro?
            `<div class="team-val" style="font-size:13px;line-height:1.6;">${w.notes||'<span style="font-style:italic;color:var(--text-muted);">No notes</span>'}</div>`:
            `<textarea class="notes-area" placeholder="Internal notes — special requests, access info, anything the team needs to know..." oninput="w.notes=this.value;markDirty()">${w.notes||''}</textarea>`
          }
        </div>
      </div>
    </div>
  </div>`;

  document.getElementById('content').innerHTML=html;
}

function renderTeamField(key,label,val,ro){
  return`<div class="team-row">
    <div class="team-label">${label}</div>
    ${ro?`<div class="team-val">${val||'—'}</div>`:
    `<select class="team-edit" onchange="wedding.team['${key}']=this.value;markDirty()">${memberOpts(val)}</select>`}
  </div>`;
}

function renderVendorRow(v,i,ro){
  if(ro){
    return`<div class="vendor-row">
      <div style="font-size:13px;font-weight:500;">${v.name||'—'}</div>
      <div style="font-size:12px;color:var(--text-muted);">${v.role||'—'}</div>
      <div style="font-size:12px;color:var(--text-muted);">${v.contact||'—'}</div>
      <span></span>
    </div>`;
  }
  return`<div class="vendor-row" id="vr${i}">
    <input class="vendor-input" value="${v.name||''}" placeholder="Vendor name" oninput="wedding.vendors[${i}].name=this.value;markDirty()"/>
    <input class="vendor-input" value="${v.role||''}" placeholder="Florist, DJ, etc." oninput="wedding.vendors[${i}].role=this.value;markDirty()"/>
    <input class="vendor-input" value="${v.contact||''}" placeholder="Phone or email" oninput="wedding.vendors[${i}].contact=this.value;markDirty()"/>
    <button class="del-btn" onclick="removeVendor(${i})">✕</button>
  </div>`;
}

function renderTimelineRow(t,i,ro){
  if(ro){
    return`<div class="timeline-row">
      <div style="font-size:12px;font-weight:500;color:var(--accent);">${t.time||'—'}</div>
      <div style="font-size:13px;">${t.event||'—'}</div>
      <span></span>
    </div>`;
  }
  return`<div class="timeline-row" id="tlr${i}">
    <input class="time-input" value="${t.time||''}" placeholder="e.g. 2:00 PM" oninput="wedding.timeline[${i}].time=this.value;markDirty()"/>
    <input class="time-input" value="${t.event||''}" placeholder="e.g. Ceremony begins" oninput="wedding.timeline[${i}].event=this.value;markDirty()" style="flex:1;"/>
    <button class="del-btn" onclick="removeTimeline(${i})">✕</button>
  </div>`;
}

function renderShotRow(s,i,ro){
  if(ro){
    return`<div class="shot-item">
      <input type="checkbox" class="shot-check" ${s.checked?'checked':''} onchange="wedding.shotList[${i}].checked=this.checked;saveChanges()"/>
      <span class="shot-text" style="${s.checked?'text-decoration:line-through;color:var(--text-muted);':''}">${s.text||''}</span>
    </div>`;
  }
  return`<div class="shot-item" id="sr${i}">
    <input type="checkbox" class="shot-check" ${s.checked?'checked':''} onchange="wedding.shotList[${i}].checked=this.checked;markDirty()"/>
    <input class="shot-input" value="${s.text||''}" placeholder="Shot description" oninput="wedding.shotList[${i}].text=this.value;markDirty()"/>
    <button class="del-btn" onclick="removeShot(${i})">✕</button>
  </div>`;
}

function addVendor(){if(!isAdmin)return;if(!wedding.vendors)wedding.vendors=[];wedding.vendors.push({name:'',role:'',contact:''});markDirty();renderPage();}
function removeVendor(i){wedding.vendors.splice(i,1);markDirty();renderPage();}
function addTimeline(){if(!isAdmin)return;if(!wedding.timeline)wedding.timeline=[];wedding.timeline.push({time:'',event:''});markDirty();renderPage();}
function removeTimeline(i){wedding.timeline.splice(i,1);markDirty();renderPage();}
function addShot(){if(!isAdmin)return;if(!wedding.shotList)wedding.shotList=[];wedding.shotList.push({text:'',checked:false});markDirty();renderPage();}
function removeShot(i){wedding.shotList.splice(i,1);markDirty();renderPage();}

if(sessionStorage.getItem('tmw_wdi_admin')==='1'){isAdmin=true;}
loadData();
</script>
</body>
</html>
