<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TM Weddings — Signing in...</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0d1f1f;
  color:#f6fefe;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  text-align:center;
}
.wrap{max-width:340px;}
.spinner{
  width:32px;height:32px;
  border:3px solid rgba(74,172,172,0.2);
  border-top-color:#4aacac;
  border-radius:50%;
  animation:spin 0.7s linear infinite;
  margin:0 auto 24px;
}
@keyframes spin{to{transform:rotate(360deg)}}
h1{font-size:1.1rem;font-weight:500;margin-bottom:8px;}
p{font-size:0.85rem;color:#9ab8b8;line-height:1.5;}
.err{display:none;background:#3a1a1a;border:1px solid #c0392b;border-radius:8px;padding:12px;margin-top:16px;font-size:0.75rem;text-align:left;word-break:break-all;}
.btn{display:inline-block;margin-top:16px;padding:10px 20px;background:#4aacac;color:white;border-radius:8px;text-decoration:none;font-weight:600;font-size:0.85rem;}
</style>
</head>
<body>

<div class="wrap">
  <div class="spinner" id="spinner"></div>
  <h1 id="status">Completing sign in...</h1>
  <p id="detail">One moment.</p>
  <div class="err" id="err"></div>
</div>

<script>
var SUPABASE_URL = 'https://rafygjaemcjhnououmwn.supabase.co';
var SUPABASE_KEY = 'sb_publishable_2rv2vfk2vKGFrd36RdVb6g_RaJWQSCp';

var APPROVED_EMAILS = [
  'tonyellismartinez@gmail.com',

  'kaitlyncapturesphotography@gmail.com'
];

function showError(msg, detail) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('status').textContent = 'Sign in failed';
  document.getElementById('detail').textContent = msg;
  if (detail) {
    var err = document.getElementById('err');
    err.textContent = detail;
    err.style.display = 'block';
  }
  var btn = document.createElement('a');
  btn.className = 'btn';
  btn.href = '/login.html';
  btn.textContent = 'Back to Login';
  document.querySelector('.wrap').appendChild(btn);
}

function parseHash(hash) {
  var out = {};
  if (!hash) return out;
  if (hash.charAt(0) === '#') hash = hash.slice(1);
  var parts = hash.split('&');
  for (var i = 0; i < parts.length; i++) {
    var kv = parts[i].split('=');
    if (kv.length === 2) {
      out[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]);
    }
  }
  return out;
}

function decodeJWT(token) {
  try {
    var parts = token.split('.');
    if (parts.length < 2) return null;
    var payload = parts[1].replace(/-/g, '+').replace(/_/g, '/');
    while (payload.length % 4) payload += '=';
    return JSON.parse(atob(payload));
  } catch(e) { return null; }
}

(async function() {
  try {
    var tokens = parseHash(window.location.hash);

    if (!tokens.access_token) {
      showError(
        'Missing access token in URL.',
        'Hash: ' + (window.location.hash || '(none)')
      );
      return;
    }

    // Decode the JWT to get user info — we don't even need the SDK for this
    var jwt = decodeJWT(tokens.access_token);
    if (!jwt || !jwt.email) {
      showError('Could not decode user from token.', 'JWT decode failed.');
      return;
    }

    var email = String(jwt.email).toLowerCase();

    if (APPROVED_EMAILS.indexOf(email) === -1) {
      showError('Email not authorized: ' + email, 'Contact Tony to add this email to the approved list.');
      return;
    }

    // Build the session payload that Supabase expects in localStorage
    // This is the format the auth guard reads in your portal pages
    var sessionPayload = {
      access_token: tokens.access_token,
      refresh_token: tokens.refresh_token || '',
      expires_at: parseInt(tokens.expires_at, 10) || (Math.floor(Date.now()/1000) + 3600),
      expires_in: parseInt(tokens.expires_in, 10) || 3600,
      token_type: tokens.token_type || 'bearer',
      provider_token: tokens.provider_token || null,
      provider_refresh_token: tokens.provider_refresh_token || null,
      user: {
        id: jwt.sub,
        email: email,
        user_metadata: jwt.user_metadata || {},
        app_metadata: jwt.app_metadata || {}
      }
    };

    // Write directly to localStorage under the expected key
    try {
      localStorage.setItem('sb-rafygjaemcjhnououmwn-auth-token', JSON.stringify(sessionPayload));
    } catch(e) {
      showError(
        'Could not save session. Are you in Private Browsing?',
        'Error: ' + e.message
      );
      return;
    }

    // Verify the write actually persisted (iOS Safari sometimes silently rejects)
    var verify = null;
    try { verify = localStorage.getItem('sb-rafygjaemcjhnououmwn-auth-token'); } catch(e) {}

    if (!verify) {
      showError(
        'localStorage write was rejected by the browser.',
        'This usually means Private Browsing is on, or storage is full. Disable Private Browsing and try again.'
      );
      return;
    }

    // ALSO try the SDK approach as backup so refresh tokens etc. work
    try {
      var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          storage: window.localStorage,
          detectSessionInUrl: false
        }
      });
      await sb.auth.setSession({
        access_token: tokens.access_token,
        refresh_token: tokens.refresh_token || ''
      });
    } catch(e) { /* manual write above is the source of truth */ }

    document.getElementById('status').textContent = 'Signed in!';
    document.getElementById('detail').textContent = 'Redirecting...';

    var redirect = new URLSearchParams(window.location.search).get('redirect') || '/';
    setTimeout(function(){ window.location.replace(redirect); }, 200);

  } catch(err) {
    showError('Unexpected error', (err && err.message) ? err.message : String(err));
    try { console.error('Callback error:', err); } catch(e) {}
  }
})();
</script>

</body>
</html>
