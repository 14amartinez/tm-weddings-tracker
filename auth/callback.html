<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TM Weddings — Signing in...</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0d1f1f;
  color:#f6fefe;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  text-align:center;
}
.wrap{max-width:340px;}
.spinner{
  width:32px;height:32px;
  border:3px solid rgba(74,172,172,0.2);
  border-top-color:#4aacac;
  border-radius:50%;
  animation:spin 0.7s linear infinite;
  margin:0 auto 24px;
}
@keyframes spin{to{transform:rotate(360deg)}}
h1{font-size:1.1rem;font-weight:500;margin-bottom:8px;}
p{font-size:0.85rem;color:#9ab8b8;line-height:1.5;}
.err{display:none;background:#3a1a1a;border:1px solid #c0392b;border-radius:8px;padding:12px;margin-top:16px;font-size:0.8rem;text-align:left;}
.btn{display:inline-block;margin-top:16px;padding:10px 20px;background:#4aacac;color:white;border-radius:8px;text-decoration:none;font-weight:600;font-size:0.85rem;}
</style>
</head>
<body>

<div class="wrap">
  <div class="spinner" id="spinner"></div>
  <h1 id="status">Completing sign in...</h1>
  <p id="detail">One moment.</p>
  <div class="err" id="err"></div>
</div>

<script>
const SUPABASE_URL = 'https://rafygjaemcjhnououmwn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_2rv2vfk2vKGFrd36RdVb6g_RaJWQSCp';

const APPROVED_EMAILS = [
  'tonyellismartinez@gmail.com',
  'brynn.weller95@gmail.com',
  'leximartinez43@gmail.com',
  'bellamartinezphoto@gmail.com',
  'zerwin1212@gmail.com',
  'lukeh61403@gmail.com',
  'nstewart2022@gmail.com',
  'nolang999@gmail.com',
  'pjmagic2404@gmail.com',
  'natashat.photo@gmail.com',
  'kauffman424@gmail.com',
  'djspangler05@gmail.com',
  'zsanchez2149@gmail.com',
  'kaitlyncapturesphotography@gmail.com',
];

function showError(msg, detail) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('status').textContent = 'Sign in failed';
  document.getElementById('detail').textContent = msg;
  if (detail) {
    var err = document.getElementById('err');
    err.textContent = detail;
    err.style.display = 'block';
  }
  // Add a "back to login" link
  var btn = document.createElement('a');
  btn.className = 'btn';
  btn.href = '/login.html';
  btn.textContent = 'Back to Login';
  document.querySelector('.wrap').appendChild(btn);
}

(async function() {
  try {
    // CRITICAL: detectSessionInUrl is the option that tells Supabase to parse OAuth tokens from window.location
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: {
        detectSessionInUrl: true,
        persistSession: true,
        autoRefreshToken: true,
        flowType: 'implicit'  // Match what your login.html uses (signInWithOAuth defaults to implicit)
      }
    });

    // Give the SDK a moment to process the URL hash/query
    // This is what was failing on mobile — race condition between SDK init and getSession()
    await new Promise(function(resolve){ setTimeout(resolve, 100); });

    // Now get the session — should be populated from URL by detectSessionInUrl
    var result = await sb.auth.getSession();
    var session = result.data && result.data.session;

    // Fallback: if getSession() returns nothing but the URL has tokens, try exchangeCodeForSession
    if (!session && (window.location.hash || window.location.search.indexOf('code=') > -1)) {
      try {
        var exchange = await sb.auth.exchangeCodeForSession(window.location.href);
        session = exchange.data && exchange.data.session;
      } catch(e) { /* exchange not supported in implicit flow, that's fine */ }
    }

    // Wait one more tick if still nothing — sometimes the listener fires async
    if (!session) {
      await new Promise(function(resolve){ setTimeout(resolve, 500); });
      var retry = await sb.auth.getSession();
      session = retry.data && retry.data.session;
    }

    if (!session) {
      showError(
        'No session was created. Try logging in again.',
        'Debug info:\nURL hash: ' + (window.location.hash || '(none)') + '\nURL query: ' + (window.location.search || '(none)') + '\nlocalStorage keys: ' + Object.keys(localStorage).join(', ')
      );
      return;
    }

    var email = (session.user && session.user.email || '').toLowerCase();

    if (!APPROVED_EMAILS.includes(email)) {
      // Sign them out and reject
      try { await sb.auth.signOut(); } catch(e) {}
      showError('Email not authorized: ' + email, 'Contact Tony to add this email to the approved list.');
      return;
    }

    // Success — clean URL and redirect
    document.getElementById('status').textContent = 'Signed in!';
    document.getElementById('detail').textContent = 'Redirecting...';

    // Clean the hash/query from URL before redirecting (security hygiene)
    var redirect = new URLSearchParams(window.location.search).get('redirect') || '/';
    // Use replace so back button doesn't return to callback
    window.location.replace(redirect);

  } catch(err) {
    showError('Unexpected error', err && err.message ? err.message : String(err));
    try { console.error('Callback error:', err); } catch(e) {}
  }
})();
</script>

</body>
</html>
